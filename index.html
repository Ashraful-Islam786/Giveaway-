<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SAS4 Giveaway</title>
<style>
body{font-family:Arial;text-align:center;padding:20px;background:linear-gradient(-45deg,#ff00cc,#3333ff,#00ffcc,#ffcc00);background-size:400% 400%;animation:bg 10s ease infinite;color:white;}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.container{max-width:700px;margin:auto;padding:20px;background:rgba(0,0,0,.6);border-radius:16px}
input,textarea{width:80%;padding:12px;margin:8px;border-radius:10px}
button{padding:12px 18px;margin:8px}
#wheel{width:220px;height:220px;border-radius:50%;border:6px solid cyan;display:flex;align-items:center;justify-content:center;margin:20px auto;transition:transform 3s}
#adminPanel{display:none}
#adminEntries{display:none;text-align:left}
</style>
</head>
<body>
<div class="container">
<h1>SAS4 GIVEAWAY</h1>
<input id="name" placeholder="Messenger name">
<textarea id="comment" placeholder="Comment"></textarea><br>
<button onclick="addEntry()">Submit Entry</button>
<div id="wheel">SPIN</div>
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="Admin password">
<button onclick="loginAdmin()">Unlock Admin</button>
<div id="adminPanel">
<button onclick="pickWinner()">Spin Winner</button>
<h3>All Entries (Admin Only)</h3>
<ul id="adminEntries"></ul>
</div>
<h3>Winners</h3>
<ol id="winners"></ol>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBiXmdYtvLLXkJV7-BqNi6DWb1PHichHLg",
authDomain:"giveaway-dafa3.firebaseapp.com",
projectId:"giveaway-dafa3",
storageBucket:"giveaway-dafa3.firebasestorage.app",
messagingSenderId:"727523507923",
appId:"1:727523507923:web:b61395320e2b0860841e26"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const ADMIN_PASSWORD="77440";

window.addEntry=async function(){
let name=document.getElementById('name').value.trim();
let comment=document.getElementById('comment').value.trim();
if(!name||!comment)return alert('Fill both');
await addDoc(collection(db,'entries'),{name,comment,time:Date.now()});
alert('Entry submitted');
document.getElementById('name').value='';
document.getElementById('comment').value='';
}

window.loginAdmin=async function(){
let p=document.getElementById('adminPass').value;
if(p!==ADMIN_PASSWORD){alert('Wrong password');return;}
document.getElementById('adminPanel').style.display='block';
loadEntries();
loadWinners();
}

async function loadEntries(){
let snap=await getDocs(collection(db,'entries'));
let html='';
snap.forEach(doc=>{
let e=doc.data();
html+=`<li>${e.name} - ${e.comment}</li>`;
});
document.getElementById('adminEntries').style.display='block';
document.getElementById('adminEntries').innerHTML=html;
}

async function loadWinners(){
let snap=await getDocs(collection(db,'winners'));
let html='';
snap.forEach(doc=>{
let w=doc.data();
html+=`<li>${w.name}</li>`;
});
document.getElementById('winners').innerHTML=html;
}

window.pickWinner=async function(){
let snap=await getDocs(collection(db,'entries'));
let pool=[];
snap.forEach(d=>pool.push(d.data()));
if(pool.length===0){alert('No entries');return;}
let pick=pool[Math.floor(Math.random()*pool.length)];
let wheel=document.getElementById('wheel');
wheel.style.transform=`rotate(${1800+Math.random()*360}deg)`;
setTimeout(async()=>{
await addDoc(collection(db,'winners'),{name:pick.name});
wheel.innerHTML='WINNER<br>'+pick.name;
loadWinners();
},3000);
}
</script>
</body>
</html>
